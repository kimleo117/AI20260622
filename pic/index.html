    <style>
      body {
        background-color: pink;
      }
      .marquee-container {
        overflow: hidden;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
      }
      .marquee {
        display: inline-block;
        white-space: nowrap;
        min-width: 100%;
        padding: 0.75rem 0;
        animation: marquee 25s linear infinite;
      }
      .text-red {
        color: blue;
      }
      #carouselExampleIndicators {
        margin-top: 30px;  
      }
      @keyframes marquee {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }

      <!-- GOOGLE fonts 字體外掛 -->

      .new-tegomin-regular {
        font-family: "New Tegomin", serif;
        font-weight: 400;
        font-style: normal;
        }

        .noto-sans-tc {
        font-family: "Noto Sans TC", sans-serif;
        font-optical-sizing: auto;
        font-weight: 600;
        font-style: normal;
        }
        .my-section {
          background-image: url("Firefly-1.png");
        }
        .media-container {
          display: flex;
          gap: 20px;
          justify-content: center;
          align-items: flex-start;
          flex-wrap: wrap;
          margin: 30px 0;
        }
        .media-container > div {
          flex: 1;
          min-width: 300px;
        }
    </style>
  </head>
